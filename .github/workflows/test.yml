name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.1

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
        task: [test]
        include:
          - python-version: "3.12"
            task: benchmark
          - python-version: "3.10"
            task: skala

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          micromamba-version: latest
          environment-file: environment.yml
          environment-name: ooo-python
          create-args: python=${{ matrix.python-version }}
          cache-environment: true

      - name: Install package
        run: pip install --no-build-isolation -e ".[test]"

      - name: Run tests
        if: ${{ matrix.task == 'test' }}
        run: >-
          pytest -v --cov=openorbitaloptimizer --cov-report=xml
          --ignore=tests/test_benchmark.py
          --ignore=tests/test_skala.py
          tests

      - name: Run benchmark tests
        if: ${{ matrix.task == 'benchmark' }}
        run: >-
          pytest -v -s --cov=openorbitaloptimizer --cov-report=xml
          tests/test_benchmark.py

      - name: Run skala tests
        if: ${{ matrix.task == 'skala' }}
        run: >-
          pytest -v --cov=openorbitaloptimizer --cov-report=xml
          tests/test_skala.py

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml